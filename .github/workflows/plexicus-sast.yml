# Plexicus SAST — primary security scan for the Kotlin benchmark.
#
# This pipeline runs the Plexicus SAST Engine against both Kotlin modules in this
# repository (spring-app and android-app) as independent scan targets, so that the
# coverage status per module remains visible. Critical and High findings fail the
# build; Medium and below are reported but non-blocking, in line with the P1/Partial
# Kotlin coverage roadmap.
name: Plexicus SAST

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  security-events: write
  actions: read
  pull-requests: write

env:
  PLEXICUS_FAIL_ON: "CRITICAL,HIGH"
  PLEXICUS_RULES_FILE: sast/plexicus-rules.yml

jobs:
  scan-spring:
    name: Plexicus SAST — spring-app (Kotlin/JVM)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Plexicus SAST scan (spring-app)
        uses: plexicus/plexicus-sast-action@v1
        with:
          scan-target: spring-app/
          language: kotlin
          framework: spring-boot
          rules-file: ${{ env.PLEXICUS_RULES_FILE }}
          fail-on: ${{ env.PLEXICUS_FAIL_ON }}
          output: sast/plexicus-spring.sarif
        env:
          PLEXICUS_API_KEY: ${{ secrets.PLEXICUS_API_KEY }}

      - name: Upload Plexicus SARIF (spring)
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: sast/plexicus-spring.sarif
          category: plexicus-spring

      - name: Archive results (spring)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: plexicus-spring-sarif
          path: sast/plexicus-spring.sarif

  scan-android:
    name: Plexicus SAST — android-app (Kotlin/Android)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Plexicus SAST scan (android-app)
        uses: plexicus/plexicus-sast-action@v1
        with:
          scan-target: android-app/
          language: kotlin
          framework: android
          rules-file: ${{ env.PLEXICUS_RULES_FILE }}
          # Android Kotlin coverage is partial — do not fail on every High during
          # rule maturation. Critical still blocks.
          fail-on: "CRITICAL"
          output: sast/plexicus-android.sarif
        env:
          PLEXICUS_API_KEY: ${{ secrets.PLEXICUS_API_KEY }}

      - name: Upload Plexicus SARIF (android)
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: sast/plexicus-android.sarif
          category: plexicus-android

      - name: Archive results (android)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: plexicus-android-sarif
          path: sast/plexicus-android.sarif

  gate:
    name: Plexicus Gate
    runs-on: ubuntu-latest
    needs: [scan-spring, scan-android]
    if: always()
    steps:
      - name: Summary
        run: |
          echo "## Plexicus SAST — Kotlin (Spring Boot + Android)" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Module       | Status                                |" >> "$GITHUB_STEP_SUMMARY"
          echo "|--------------|---------------------------------------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| spring-app   | ${{ needs.scan-spring.result }}      |" >> "$GITHUB_STEP_SUMMARY"
          echo "| android-app  | ${{ needs.scan-android.result }}     |" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "See docs/coverage-report.md for the P1/Partial rule matrix." >> "$GITHUB_STEP_SUMMARY"
