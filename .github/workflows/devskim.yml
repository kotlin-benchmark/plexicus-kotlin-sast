# DevSkim CI — proves DevSkim Kotlin detection in CI for both Spring Boot and Android.
#
# This workflow exists to provide reproducible, third-party (Microsoft) evidence that
# the Kotlin sources in this repository are detected by a widely-deployed static
# analyzer. The SARIF output it produces is uploaded to GitHub Code Scanning and
# also committed to sast/devskim-results.sarif for offline inspection.
name: DevSkim (Kotlin coverage proof)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * 1"

permissions:
  contents: read
  security-events: write
  actions: read

jobs:
  devskim-spring:
    name: DevSkim — spring-app/ (Kotlin/JVM)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run DevSkim against spring-app/
        uses: microsoft/DevSkim-Action@v1
        with:
          directory-to-scan: spring-app/
          output-filename: devskim-spring.sarif

      - name: Upload SARIF (spring)
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: devskim-spring.sarif
          category: devskim-spring

      - name: Archive SARIF (spring)
        uses: actions/upload-artifact@v4
        with:
          name: devskim-spring-sarif
          path: devskim-spring.sarif

  devskim-android:
    name: DevSkim — android-app/ (Kotlin/Android)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run DevSkim against android-app/
        uses: microsoft/DevSkim-Action@v1
        with:
          directory-to-scan: android-app/
          output-filename: devskim-android.sarif

      - name: Upload SARIF (android)
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: devskim-android.sarif
          category: devskim-android

      - name: Archive SARIF (android)
        uses: actions/upload-artifact@v4
        with:
          name: devskim-android-sarif
          path: devskim-android.sarif

  evidence-summary:
    name: Evidence summary
    runs-on: ubuntu-latest
    needs: [devskim-spring, devskim-android]
    steps:
      - name: Summary
        run: |
          echo "## DevSkim Kotlin detection — evidence" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Proves DevSkim Kotlin detection in CI — both Spring Boot and Android." >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- spring-app/  → see job *DevSkim — spring-app/*"  >> "$GITHUB_STEP_SUMMARY"
          echo "- android-app/ → see job *DevSkim — android-app/*" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "SARIF artifacts attached to this workflow run." >> "$GITHUB_STEP_SUMMARY"
