name: "CodeQL"

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  schedule:
    - cron: '0 0 * * 1'
  workflow_dispatch:
    inputs:
      languages:
        description: 'Languages to analyze'
        required: true
        default: 'java-kotlin'

jobs:
  analyze:
    name: Analyze
    runs-on: ubuntu-latest
    permissions:
      contents: write
      security-events: write
      actions: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.7"


      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ github.event.inputs.languages || 'java-kotlin' }}
          build-mode: manual

      - name: Build spring-app
        run: gradle build -x test --no-daemon
        working-directory: spring-app

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:${{ github.event.inputs.languages || 'java-kotlin' }}"
